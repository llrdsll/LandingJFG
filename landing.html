<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Moderna</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .parallax {
            height: 100vh;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .capa-link {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            position: absolute;
        }

        .video-section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background: #f7f7f7;
        }

        .video-section video {
            width: 100%;
            max-width: 800px;
            border: 5px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .colunas {
            display: flex;
            justify-content: space-around;
            padding: 40px 20px;
            background: #f7f7f7;
            flex-wrap: wrap;
        }

        .coluna {
            background: linear-gradient(135deg, #ff6f61, #d64b4b);
            color: white;
            padding: 20px;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
            flex: 1 1 calc(30% - 40px);
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 300px;
            background-size: cover;
            background-position: center;
        }

        .coluna:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .coluna h2, .coluna h3, .coluna p {
            margin: 0 0 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease-in-out;
        }

        .coluna:hover h2, .coluna:hover h3, .coluna:hover p {
            opacity: 1;
            transform: translateY(0);
        }

        .coluna h2 {
            font-size: 24px;
            color: #fff;
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .coluna h3 {
            font-size: 18px;
            color: #fff;
            position: absolute;
            top: 60px;
            left: 20px;
        }

        .coluna p {
            font-size: 14px;
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
        }

        .capa2 {
            height: 50vh;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .capa2 .capa-link {
            position: absolute;
        }

        .duvidas {
            padding: 40px 20px;
            background: #f7f7f7;
            text-align: center;
        }

        .duvidas h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 28px;
            font-weight: bold;
        }

        .duvidas details {
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .duvidas details[open] {
            border-color: #007bff;
            background: #e9f5ff;
        }

        .duvidas summary {
            cursor: pointer;
            font-weight: bold;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .duvidas summary:hover {
            background: #ddd;
        }

        .duvidas p {
            padding: 10px;
            margin-top: 5px;
            border-top: 1px solid #ddd;
            display: none;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .duvidas details[open] p {
            display: block;
            opacity: 1;
        }

        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .coluna {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Capa com efeito parallax -->
    <section class="parallax" style="background-image: url('https://via.placeholder.com/1920x1080');">
        <a href="#link-capa1" class="capa-link"></a>
    </section>

    <!-- Vídeo -->
    <section class="video-section">
        <video controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            Seu navegador não suporta o elemento de vídeo.
        </video>
    </section>

    <!-- Colunas -->
    <section class="colunas">
        <div class="coluna" style="background-image: url('https://via.placeholder.com/300');">
            <h2>Título 1</h2>
            <h3>Subtítulo 1</h3>
            <p>Texto 1 <a href="#link1">Clique aqui</a></p>
        </div>
        <div class="coluna" style="background-image: url('https://via.placeholder.com/300');">
            <h2>Título 2</h2>
            <h3>Subtítulo 2</h3>
            <p>Texto 2 <a href="#link2">Clique aqui</a></p>
        </div>
        <div class="coluna" style="background-image: url('https://via.placeholder.com/300');">
            <h2>Título 3</h2>
            <h3>Subtítulo 3</h3>
            <p>Texto 3 <a href="#link3">Clique aqui</a></p>
        </div>
    </section>

    <!-- Capa2 -->
    <section class="capa2" style="background-image: url('https://via.placeholder.com/1920x1080');">
        <a href="#link-capa2" class="capa-link"></a>
    </section>

    <!-- Dúvidas -->
    <section class="duvidas">
        <h2>Dúvidas Frequentes</h2>
        <details>
            <summary>Pergunta 1</summary>
            <p>Resposta 1</p>
        </details>
        <details>
            <summary>Pergunta 2</summary>
            <p>Resposta 2</p>
        </details>
        <details>
            <summary>Pergunta 3</summary>
            <p>Resposta 3</p>
        </details>
    </section>

    <!-- Rodapé -->
    <footer>
        <p>Texto do rodapé centralizado.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Adicione seus scripts aqui
        });
    </script>
</body>
</html>
